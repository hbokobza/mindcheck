<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindCheck - Test App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px 0;
      color: #6b7280;
      font-size: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input[type="file"] {
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: #111827;
      color: white;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.info {
      display: block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .response-box {
      margin-top: 24px;
      border-top: 1px solid #e5e7eb;
      padding-top: 24px;
    }

    .response-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .response-content {
      white-space: pre-wrap;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      min-height: 120px;
      font-size: 14px;
      line-height: 1.5;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      color: #6b7280;
    }

    .file-list {
      margin-top: 8px;
      font-size: 13px;
      color: #374151;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }

      .container {
        margin: 20px auto;
        padding: 14px;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>MindCheck - Interface de test</h1>
      <p class="subtitle">
        Version simple pour vérifier que le front envoie bien les données à <code>/api/chat</code>.
      </p>

      <div class="row">
        <div class="field">
          <label for="sessionCode">Code session</label>
          <input type="text" id="sessionCode" placeholder="Ex: TEST-001" />
        </div>

        <div class="field">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="text">Texte</option>
            <option value="voice">Oral</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="message">Message / interrogatoire</label>
        <textarea id="message" placeholder="Saisissez ici le contenu du message patient ou de l'interrogatoire..."></textarea>
      </div>

      <div class="field">
        <label for="attachments">Documents joints</label>
        <input type="file" id="attachments" multiple />
        <div id="fileList" class="file-list"></div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="sendBtn">Envoyer</button>
        <button class="btn-secondary" id="clearBtn" type="button">Effacer</button>
      </div>

      <div id="statusBox" class="status"></div>

      <div class="response-box">
        <div class="response-title">Réponse</div>
        <div id="responseContent" class="response-content">Aucune réponse pour l’instant.</div>
        <div id="responseMeta" class="meta"></div>
      </div>
    </div>
  </div>

  <script>
    const sessionCodeInput = document.getElementById("sessionCode");
    const modeInput = document.getElementById("mode");
    const messageInput = document.getElementById("message");
    const attachmentsInput = document.getElementById("attachments");
    const fileList = document.getElementById("fileList");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusBox = document.getElementById("statusBox");
    const responseContent = document.getElementById("responseContent");
    const responseMeta = document.getElementById("responseMeta");

    let encodedAttachments = [];

    function setStatus(message, type = "info") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = reader.result || "";
          const base64 = String(result).split(",")[1] || "";
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    attachmentsInput.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      fileList.innerHTML = "";

      if (!files.length) {
        encodedAttachments = [];
        return;
      }

      setStatus("Encodage des documents en cours...", "info");

      try {
        encodedAttachments = await Promise.all(
          files.map(async (file) => ({
            name: file.name,
            type: file.type || "application/octet-stream",
            size: file.size,
            content: await toBase64(file)
          }))
        );

        fileList.innerHTML = files
          .map(file => `<div>- ${file.name} (${Math.round(file.size / 1024)} Ko)</div>`)
          .join("");

        setStatus("Documents prêts à être envoyés.", "info");
      } catch (error) {
        encodedAttachments = [];
        setStatus("Erreur lors de la lecture des documents.", "error");
      }
    });

    clearBtn.addEventListener("click", () => {
      sessionCodeInput.value = "";
      modeInput.value = "text";
      messageInput.value = "";
      attachmentsInput.value = "";
      encodedAttachments = [];
      fileList.innerHTML = "";
      responseContent.textContent = "Aucune réponse pour l’instant.";
      responseMeta.textContent = "";
      clearStatus();
    });

    sendBtn.addEventListener("click", async () => {
      const sessionCode = sessionCodeInput.value.trim() || "TEST-001";
      const mode = modeInput.value;
      const message = messageInput.value.trim();

      if (!message) {
        setStatus("Veuillez saisir un message avant l’envoi.", "error");
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "Envoi...";
      setStatus("Requête en cours vers /api/chat ...", "info");

      responseContent.textContent = "Chargement...";
      responseMeta.textContent = "";

      try {
        const payload = {
          sessionCode,
          mode,
          message,
          attachments: encodedAttachments
        };

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data?.error || "Erreur API");
        }

        responseContent.textContent =
          data.reply ||
          data.response ||
          data.output ||
          "Réponse reçue mais champ texte non reconnu.";

        const metaParts = [];

        if (data.meta?.blocked !== undefined) {
          metaParts.push("blocked: " + String(data.meta.blocked));
        }

        if (data.meta?.reason) {
          metaParts.push("reason: " + data.meta.reason);
        }

        if (data.meta?.flags) {
          metaParts.push("flags: " + JSON.stringify(data.meta.flags));
        }

        if (data.meta?.policy) {
          metaParts.push("policy: " + data.meta.policy);
        }

        responseMeta.textContent = metaParts.join(" | ");

        setStatus("Réponse reçue avec succès.", "info");
      } catch (error) {
        responseContent.textContent = "Erreur lors de l’appel API.";
        responseMeta.textContent = "";
        setStatus(error.message || "Erreur inconnue.", "error");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Envoyer";
      }
    });
  </script>
</body>
</html>
